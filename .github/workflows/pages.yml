# .github/workflows/pages.yml
name: Docs Site
on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  pull_request:
    paths: ['site/**', '.github/workflows/pages.yml']
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  # Don't cancel an in-flight production deploy — a cancelled Pages deploy does
  # not auto-retry and would leave the live site stale until a manual re-run.
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: node --test test/*.test.mjs
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'site/dist'
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
