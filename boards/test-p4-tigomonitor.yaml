# Tigo Monitor — ESP32-P4 test config (local components)
# Mirrors /home/rar/device-configs/esphome/TigoMonitor/TigoMonitorP4.yaml but
# points at the local component sources for branch testing, and adds the
# tsdb partition + esp_tsdb dependency from feat/tsdb-phase1.

esphome:
  name: tigo-monitor-p4
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-p4-evboard
  cpu_frequency: 400MHz
  flash_size: 16MB
  partitions: partitions/tigo-16mb.csv
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
    # TODO(tsdb): re-enable once esp_tsdb upstream adds esp32p4 to supported_targets.
    # The IDF Component Manager rejects the dep on P4 because the published manifest
    # only lists esp32 / esp32s2 / esp32s3 / esp32c3 / esp32c6 / esp32h2.
    # Tracking: https://github.com/zakery292/esp_tsdb (manifest: idf_component.yml)
    # components:
    #   - zakery292/esp_tsdb^2.0.2
    sdkconfig_options:
      # UART optimizations — aggressive for 32 MB PSRAM
      CONFIG_UART_ISR_IN_IRAM: "y"
      CONFIG_UART_RX_BUFFER_SIZE: "16384"
      CONFIG_UART_TX_BUFFER_SIZE: "4096"

      # High-frequency FreeRTOS tick for better interrupt responsiveness
      CONFIG_FREERTOS_HZ: "1000"

      # Increase event queue size for high throughput
      CONFIG_FREERTOS_QUEUE_REGISTRY_SIZE: "128"

      # Disable tickless idle to reduce interrupt latency
      CONFIG_FREERTOS_USE_TICKLESS_IDLE: "n"

      # Increase lwIP sockets to prevent "Failed to create socket" errors
      CONFIG_LWIP_MAX_SOCKETS: "32"
      CONFIG_LWIP_MAX_ACTIVE_TCP: "32"
      CONFIG_LWIP_MAX_LISTENING_TCP: "32"

# Local components for branch testing
external_components:
  - source:
      type: local
      path: ../components
    refresh: 0s
    components: [ tigo_monitor, tigo_server ]

esp32_hosted:
  variant: ESP32C6
  clk_pin: GPIO18
  cmd_pin: GPIO19
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  reset_pin: GPIO54
  active_high: true
  slot: 1

http_request:

update:
  - platform: esp32_hosted
    name: ESP-Hosted Firmware
    icon: mdi:chip
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

psram:
  mode: hex
  speed: 200MHz

logger:
  level: INFO
  hardware_uart: UART0

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_encryption_key

mdns:
  services:
    - service: tigo-dashboard-p4
      protocol: tcp
      port: 80
      txt:
        version: "1.0"
        device: "tigo-solar-dashboard"
        panels: "36"

uart:
  - id: tigo_uart
    tx_pin: GPIO20
    rx_pin:
      number: GPIO21
    baud_rate: 38400
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 16384

tigo_monitor:
  id: tigo_hub
  time_id: ha_time
  uart_id: tigo_uart
  update_interval: 30s
  number_of_devices: 36
  cca_ip: 10.75.0.16
  sync_cca_on_startup: false
  reset_at_midnight: true
  inverters:
    - name: "FlexBoss A"
      mppts:
        - "MPPT 1"
        - "MPPT 2"
    - name: "FlexBoss B"
      mppts:
        - "MPPT 3"
        - "MPPT 4"

tigo_server:
  id: tigo_web
  tigo_monitor_id: tigo_hub
  port: 80

sensor:
  - platform: wifi_signal
    name: "Tigo Server WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  - platform: uptime
    name: "Tigo Server Uptime"
    update_interval: 60s

  - platform: tigo_monitor
    name: "ESP32 Internal RAM Free"

  - platform: tigo_monitor
    name: "ESP32 Internal RAM Min"

  - platform: tigo_monitor
    name: "ESP32 PSRAM Free"

  - platform: tigo_monitor
    name: "ESP32 Stack Free"

  - platform: tigo_monitor
    tigo_monitor_id: tigo_hub
