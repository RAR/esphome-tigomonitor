# ESP32-S3 M5Stack AtomS3R Configuration
# 8MB PSRAM, 240MHz, Octal PSRAM
# AtomS3R features built-in tail485 RS485 transceiver (using internal pins GPIO1/GPIO2)
# Recommended for: Standard installations (up to ~30 devices)

esphome:
  name: tigo-server
  friendly_name: "Tigo Server"
  # allow_partition_access in the OTA config requires ESPHome 2026.5.0+
  min_version: "2026.5.0"

esp32:
  board: m5stack-atoms3
  variant: esp32s3
  flash_size: 8MB
  partitions: partitions/tigo-8mb.csv
  framework:
    type: esp-idf
    version: recommended
    components:
      # Time-series database for persistent history (see docs/tsdb-integration.md).
      # 2.1.0 is the first upstream release with the handle-based multi-instance
      # API and the wrapped-ring query fix this project depends on.
      - zakery292/esp_tsdb^2.1.0
      # LittleFS — backing filesystem for the tsdb partition
      - joltwallet/littlefs^1.16
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      # UART optimizations to prevent packet loss
      CONFIG_UART_ISR_IN_IRAM: "y"
      CONFIG_UART_RX_BUFFER_SIZE: "2048"
      CONFIG_UART_TX_BUFFER_SIZE: "512"
      # Note: Increase RX to 8192 if using atoms3r-display.yaml package
      # TX can stay small (512-1024) since we only listen to the bus
      # Increase event queue size
      CONFIG_FREERTOS_QUEUE_REGISTRY_SIZE: "32"
      # Logging optimizations
      CONFIG_LOG_DEFAULT_LEVEL_INFO: "y"
      CONFIG_LOG_MAXIMUM_LEVEL_VERBOSE: "y"
      # Enable PSRAM (8MB on AtomS3R)
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      # Allocate WiFi + lwIP buffers in PSRAM to free internal RAM.
      # Recommended for large installs — prevents new-connection resets
      # (OTA / API) after uptime when internal RAM gets tight.
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      # More lwIP sockets for the web server + API + cloud running together
      # (avoids "Failed to create socket" under load, #20). Safe here since the
      # buffers land in PSRAM via SPIRAM_TRY_ALLOCATE_WIFI_LWIP above.
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_LWIP_MAX_ACTIVE_TCP: "16"
      CONFIG_LWIP_MAX_LISTENING_TCP: "16"


# Enable PSRAM
psram:
  mode: octal
  speed: 80MHz

# UART configuration for Tigo communication
# AtomS3R has built-in tail485 RS485 transceiver on GPIO1/GPIO2
uart:
  id: tigo_uart
  tx_pin: GPIO1   # AtomS3R built-in tail485 TX
  rx_pin: GPIO2   # AtomS3R built-in tail485 RX
  baud_rate: 38400
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 2048  # Optimized for 8MB PSRAM

# Tigo Monitor component
tigo_monitor:
  id: tigo_hub
  uart_id: tigo_uart
  number_of_devices: 30  # Suitable for 8MB PSRAM
  update_interval: 30s

# Custom web server
tigo_server:
  id: tigo_web
  tigo_monitor_id: tigo_hub
  port: 80
