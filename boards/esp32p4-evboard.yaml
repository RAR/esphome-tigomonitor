# ESP32-P4 Evaluation Board Configuration
# 32MB PSRAM (hex), 400MHz Dual-Core
# Recommended for: Large installations (50+ devices)
# Optimized for maximum performance and minimal packet loss
#
# NOTE — the P4 has NO built-in Wi-Fi. It reaches the network through an
# ESP32-C6/-C5 companion radio over SDIO, configured via `esp32_hosted:` below.
# NOTE — `psram: speed: 200MHz` is an *experimental* PSRAM speed on the P4 and
# only works with `enable_idf_experimental_features: yes` (set below). Without
# that flag, 200MHz PSRAM comes up unstable and the board crash-loops at boot
# (`esp_task_stack_is_sane_cache_disabled` assert, before ESPHome even starts).
# If you don't need the speed, drop to `speed: 80MHz` and remove the flag.

esphome:
  name: tigo-server
  friendly_name: "Tigo Server P4"
  # allow_partition_access in the OTA config requires ESPHome 2026.5.0+
  min_version: "2026.5.0"

esp32:
  board: esp32-p4-function-ev-board
  variant: esp32p4
  # 16MB flash + a partition table with the esp_tsdb (History) storage region.
  flash_size: 16MB
  partitions: partitions/tigo-16mb.csv
  framework:
    type: esp-idf
    version: recommended
    advanced:
      # Required for the 200MHz hex PSRAM speed below.
      enable_idf_experimental_features: yes
    components:
      # esp_tsdb backs the History view; littlefs is its filesystem. The P4
      # target still needs the RAR/esp_tsdb fork (upstream 2.1.0's manifest
      # doesn't list esp32p4 yet); S3/other targets use `zakery292/esp_tsdb^2.1.0`.
      - name: zakery292/esp_tsdb
        source: https://github.com/RAR/esp_tsdb.git
        ref: tigomonitor
      - joltwallet/littlefs^1.16
    sdkconfig_options:
      # CPU frequency (P4 runs at 400MHz)
      CONFIG_ESP32P4_DEFAULT_CPU_FREQ_400: "y"
      
      # UART optimizations - aggressive settings for 32MB PSRAM
      CONFIG_UART_ISR_IN_IRAM: "y"
      CONFIG_UART_RX_BUFFER_SIZE: "16384"  # 16KB RX buffer
      CONFIG_UART_TX_BUFFER_SIZE: "4096"   # 4KB TX buffer
      
      # High-frequency FreeRTOS tick for better interrupt responsiveness
      CONFIG_FREERTOS_HZ: "1000"  # 1ms tick instead of 10ms
      
      # Increase event queue size for high throughput
      CONFIG_FREERTOS_QUEUE_REGISTRY_SIZE: "128"
      
      # Disable tickless idle to reduce interrupt latency
      CONFIG_FREERTOS_USE_TICKLESS_IDLE: "n"
      
      # Increase lwIP sockets for HTTP operations
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_LWIP_MAX_ACTIVE_TCP: "16"
      CONFIG_LWIP_MAX_LISTENING_TCP: "16"
      
# Enable PSRAM. 200MHz is experimental (see the note at the top of this file and
# the enable_idf_experimental_features flag above). Drop to 80MHz to run without it.
psram:
  mode: hex
  speed: 200MHz

# Wi-Fi companion radio — the P4 has no native Wi-Fi, so an ESP32-C6 (or -C5)
# on the EV board provides it over SDIO. Adjust pins/slot for your wiring.
esp32_hosted:
  variant: ESP32C6
  active_high: true
  slot: 1
  clk_pin: GPIO18
  cmd_pin: GPIO19
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  reset_pin: GPIO54

# UART configuration for Tigo communication
uart:
  id: tigo_uart
  tx_pin: GPIO1   # Adjust based on your P4 board pinout
  rx_pin: GPIO3   # Adjust based on your P4 board pinout
  baud_rate: 38400
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 16384  # Match SDK buffer for consistency

# Tigo Monitor component - configured for large installations
tigo_monitor:
  id: tigo_hub
  uart_id: tigo_uart
  number_of_devices: 100  # P4 can handle much larger installations
  update_interval: 30s

# Custom web server
tigo_server:
  id: tigo_web
  tigo_monitor_id: tigo_hub
  port: 80
