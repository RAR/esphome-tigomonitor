# ESP32-S3 M5Stack AtomS3 Configuration
# NO PSRAM, 240MHz
# Recommended for: Small installations (up to ~10-15 devices)

esphome:
  name: tigo-server
  friendly_name: "Tigo Server"
  # allow_partition_access in the OTA config requires ESPHome 2026.5.0+
  min_version: "2026.5.0"

esp32:
  board: m5stack-atoms3
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      # UART optimizations to prevent packet loss
      CONFIG_UART_ISR_IN_IRAM: "y"
      CONFIG_UART_RX_BUFFER_SIZE: "1024"
      CONFIG_UART_TX_BUFFER_SIZE: "512"
      # Increase event queue size
      CONFIG_FREERTOS_QUEUE_REGISTRY_SIZE: "16"
      # Logging optimizations
      CONFIG_LOG_DEFAULT_LEVEL_INFO: "y"
      CONFIG_LOG_MAXIMUM_LEVEL_VERBOSE: "y"

# NO PSRAM on AtomS3 - using internal RAM only

# UART configuration for Tigo communication
uart:
  id: tigo_uart
  tx_pin: GPIO6   # AtomS3 with Atomic RS485 Base
  rx_pin: GPIO5   # AtomS3 with Atomic RS485 Base
  baud_rate: 38400
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 1024  # Reduced for limited internal RAM

# Tigo Monitor component
tigo_monitor:
  id: tigo_hub
  uart_id: tigo_uart
  number_of_devices: 15  # Limited by internal RAM (no PSRAM)
  update_interval: 30s

# Custom web server
tigo_server:
  id: tigo_web
  tigo_monitor_id: tigo_hub
  port: 80
